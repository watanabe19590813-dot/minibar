<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6F ミニバー賞味期限チェック</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;font-size:14px;color:#1a1a1a}
.app{max-width:960px;margin:0 auto;padding:10px}
.header{background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:0 4px 12px rgba(29,158,117,0.25)}
.header h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:0.2px}
.legend{display:flex;gap:10px;font-size:11px;color:rgba(255,255,255,0.8);flex-wrap:wrap;margin-top:5px}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:7px;height:7px;border-radius:50%}
.header-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{font-size:13px;padding:8px 16px;border:none;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;cursor:pointer;font-family:inherit;font-weight:600;backdrop-filter:blur(4px);transition:background 0.15s}
.btn:hover{background:rgba(255,255,255,0.25)}
.btn.primary{background:#fff;color:#0F6E56;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.btn.primary:hover{background:#f0fdf8}
.btn.danger{background:#E24B4A;color:#fff;border:none}
.btn.danger:hover{background:#A32D2D}
.status-bar{background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stat{font-size:12px;color:#888}
.stat b{color:#1a1a1a;font-weight:700}
.sync-status{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.sync-ok{background:#E1F5EE;color:#0F6E56}
.sync-err{background:#FCEBEB;color:#A32D2D}
.sync-loading{background:#f0f0f0;color:#888}
.table-wrap{background:#fff;border-radius:14px;overflow:auto;-webkit-overflow-scrolling:touch;max-height:calc(100vh - 140px);box-shadow:0 1px 4px rgba(0,0,0,0.06)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f4f6f8;font-weight:700;color:#888;font-size:11px;padding:9px 6px;text-align:center;border-bottom:1px solid #e8eaec;white-space:nowrap;position:sticky;top:0;z-index:2;letter-spacing:0.2px}
th:first-child{text-align:left;padding-left:12px;position:sticky;left:0;z-index:3;background:#f4f6f8}
td{padding:5px 4px;text-align:center;border-bottom:1px solid #f2f3f5;border-right:1px solid #f0f0f0}
td:last-child{border-right:none}
td:first-child{font-weight:700;font-size:12px;color:#555;text-align:left;padding-left:12px;position:sticky;left:0;background:#fff;z-index:1;border-right:1px solid #eee}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fffe}
tr:hover td:first-child{background:#f8fffe}
.cell-input{width:62px;font-size:13px;padding:5px 3px;border:1px solid transparent;border-radius:6px;background:transparent;color:#1a1a1a;text-align:center;font-family:inherit;transition:all 0.15s}
.cell-input:hover{border-color:#d0d0d0;background:#fafafa}
.cell-input:focus{outline:none;border-color:#1D9E75;background:#fff;box-shadow:0 0 0 3px rgba(29,158,117,0.12)}
.cell-input.has-value{color:#0F6E56;font-weight:700}
.cell-input.expired{color:#E24B4A;font-weight:700;background:#fff5f5}
.cell-input.expiring{color:#BA7517;font-weight:700;background:#fffbf0}
.err-box{background:#FCEBEB;border:1px solid #f0b0b0;border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#A32D2D;display:none}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,0.15);animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px}
.modal h2{font-size:17px;font-weight:700;margin-bottom:14px;color:#1a1a1a;text-align:center}
.modal-input{width:100%;font-size:34px;font-weight:700;text-align:center;padding:12px;border:2px solid #e8e8e8;border-radius:12px;background:#f8f9fa;color:#1a1a1a;margin-bottom:8px;letter-spacing:6px;font-family:inherit}
.modal-input:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,0.12)}
.modal-hint{font-size:12px;color:#aaa;margin-bottom:16px;text-align:center}
.modal-btns{display:flex;gap:10px;flex-wrap:wrap}
.item-btn{flex:1 1 calc(50% - 5px);font-size:13px;padding:14px 8px;border:1.5px solid #e8e8e8;border-radius:12px;background:#f8f9fa;color:#1a1a1a;cursor:pointer;text-align:center;font-family:inherit;line-height:1.4;font-weight:600;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.item-btn:active{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;transform:scale(0.97)}
.item-btn .cur-val{font-size:11px;color:#aaa;display:block;margin-top:3px;font-weight:400}
.fab{display:none;position:fixed;bottom:24px;right:20px;z-index:50;background:linear-gradient(135deg,#1D9E75,#0F6E56);color:#fff;border:none;border-radius:50px;padding:14px 22px;font-size:15px;font-weight:700;font-family:inherit;box-shadow:0 4px 16px rgba(29,158,117,0.4);cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:600px){
  .app{padding:6px 6px 80px}
  .header{border-radius:12px;padding:12px 14px}
  .header h1{font-size:13px}
  .header-btns .btn.primary{display:none}
  .fab{display:block}
  th,td{padding:6px 3px;font-size:11px}
  .cell-input{width:50px;font-size:11px;padding:5px 2px}
  th:first-child,td:first-child{padding-left:8px;font-size:11px;min-width:44px}
  .status-bar{border-radius:10px;gap:8px}
  .stat{font-size:11px}
  .table-wrap{max-height:calc(100vh - 160px);border-radius:12px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>【6F】ミニバー賞味期限チェック一覧表</h1>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#0F6E56"></div>入力済み</div>
        <div class="leg"><div class="leg-dot" style="background:#E24B4A"></div>期限切れ</div>
        <div class="leg"><div class="leg-dot" style="background:#BA7517"></div>翌月期限</div>
      </div>
    </div>
    <div class="header-btns">
      <span class="sync-status sync-loading" id="syncStatus">接続中...</span>
      <button class="btn" onclick="clearExpired()" style="background:rgba(226,75,74,0.15);color:#fff;border:none">期限切れ消去</button>
      <button class="btn primary" onclick="openJump()">客室検索</button>
    </div>
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="status-bar">
    <span class="stat">未入力: <b id="filledCount">0</b> セル</span>
    <span class="stat">期限切れ: <b id="expiredCount" style="color:#E24B4A">0</b> 件</span>
    <span class="stat">翌月期限: <b id="expiringCount" style="color:#BA7517">0</b> 件</span>
    <span class="stat" id="cursorPos" style="color:#1D9E75;font-weight:500"></span>
  </div>

  <button class="fab" onclick="openJump()">客室検索</button>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>部屋番号</th>
          <th>水ボトル①</th>
          <th>水ボトル②</th>
          <th>オロナミンC</th>
          <th>ポカリ</th>
          <th>コーラ</th>
          <th>お茶</th>
          <th>柿の種</th>
          <th>キリンB</th>
          <th>アサヒB</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div class="modal-bg" id="jumpModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="jumpTitle">客室検索 — 部屋番号を入力</h2>
    <input class="modal-input" id="jumpInput" type="number" placeholder="601">
    <div class="modal-hint" id="jumpHint">3桁の部屋番号を入力して Enter</div>
    <div class="modal-btns" id="jumpBtns">
      <button class="btn" onclick="closeJump()" style="flex:1">キャンセル</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyALKR59lVRy5685kUPes38A-mG89B-BV7s",
  authDomain: "minibar-stock.firebaseapp.com",
  databaseURL: "https://minibar-stock-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "minibar-stock",
  storageBucket: "minibar-stock.firebasestorage.app",
  messagingSenderId: "1062551441835",
  appId: "1:1062551441835:web:d886ba8992380f266682ee"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const COLS = ['水ボトル①','水ボトル②','オロナミンC','ポカリ','コーラ','お茶','柿の種','キリンB','アサヒB'];
const ROOMS = [601,602,603,604,605,606,607,608,609,610,611,612,614,615,616,617,618,619,620,621,622,623,624,625,626,627,628,629,630,631,632,633,634,635,636,637,638,639,640];

let data = {};
let jumpPhase = 'room';
ROOMS.forEach(r => { data[r] = Array(9).fill(''); });

function setSyncStatus(state, msg) {
  const el = document.getElementById('syncStatus');
  if (state === 'ok') { el.textContent = '同期済み'; el.className = 'sync-status sync-ok'; }
  else if (state === 'err') {
    el.textContent = '接続エラー'; el.className = 'sync-status sync-err';
    if (msg) { const eb = document.getElementById('errBox'); eb.textContent = 'エラー: ' + msg; eb.style.display = 'block'; }
  } else { el.textContent = '同期中...'; el.className = 'sync-status sync-loading'; }
}

db.ref('rooms').on('value', snapshot => {
  const val = snapshot.val();
  ROOMS.forEach(r => {
    if (val && val[r] && val[r].cells) {
      const cells = val[r].cells;
      data[r] = [];
      for (let i = 0; i < 9; i++) data[r].push(cells[i] || '');
    } else {
      data[r] = Array(9).fill('');
    }
  });
  buildTable();
  setSyncStatus('ok');
  document.getElementById('errBox').style.display = 'none';
}, err => setSyncStatus('err', err.message));

function saveCell(room, ci, value) {
  setSyncStatus('loading');
  db.ref('rooms/' + room + '/cells/' + ci).set(value || null)
    .then(() => setSyncStatus('ok'))
    .catch(e => setSyncStatus('err', e.message));
}

function formatDate(s) {
  s = (s || '').trim();
  if (!s) return '';
  if (/^\d{3}$/.test(s)) {
    const yy = s.slice(0,2);
    const mm = s.slice(2).padStart(2,'0');
    return yy + '/' + mm;
  }
  if (/^\d{4}$/.test(s)) {
    const yy = s.slice(0,2);
    const mm = s.slice(2).padStart(2,'0');
    return yy + '/' + mm;
  }
  return s;
}

function getStatus(val) {
  if (!val) return 'empty';
  const m = val.match(/^(\d{2})\/(\d{2})$/);
  if (!m) return 'ok';
  const d = (2000 + parseInt(m[1])) * 100 + parseInt(m[2]);
  const now = new Date();
  const nowNum = now.getFullYear() * 100 + (now.getMonth() + 1);
  const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  const nextMonthNum = nextMonth.getFullYear() * 100 + (nextMonth.getMonth() + 1);
  if (d <= nowNum) return 'expired';
  if (d === nextMonthNum) return 'expiring';
  return 'ok';
}

function applyClass(inp, val) {
  inp.className = 'cell-input';
  if (val) {
    const st = getStatus(val);
    if (st === 'expired') inp.classList.add('expired');
    else if (st === 'expiring') inp.classList.add('expiring');
    else inp.classList.add('has-value');
  }
}

function buildTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  ROOMS.forEach((room, ri) => {
    const tr = document.createElement('tr');
    tr.id = 'row-' + room;
    const td0 = document.createElement('td');
    td0.textContent = room;
    tr.appendChild(td0);
    (data[room] || Array(9).fill('')).forEach((val, ci) => {
      const td = document.createElement('td');
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'cell-input';
      inp.value = val || '';
      applyClass(inp, val || '');
      inp.addEventListener('focus', () => {
        document.getElementById('cursorPos').textContent = room + ' — ' + COLS[ci];
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
          e.preventDefault();
          commitCell(inp, room, ci);
          let nci = ci + 1, nri = ri;
          if (nci >= 9) { nci = 0; nri = ri + 1; }
          if (nri >= ROOMS.length) nri = 0;
          focusCell(nri, nci);
        } else if (e.key === 'Tab' && e.shiftKey) {
          e.preventDefault();
          commitCell(inp, room, ci);
          let nci = ci - 1, nri = ri;
          if (nci < 0) { nci = 8; nri = ri - 1; }
          if (nri < 0) nri = ROOMS.length - 1;
          focusCell(nri, nci);
        }
      });
      inp.addEventListener('blur', () => commitCell(inp, room, ci));
      td.appendChild(inp);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // 期限切れ合計行
  const sumTr = document.createElement('tr');
  sumTr.style.cssText = 'background:#fff5f5;font-weight:600;border-top:2px solid #E24B4A';
  const sumTd0 = document.createElement('td');
  sumTd0.textContent = '期限切れ合計';
  sumTd0.style.cssText = 'color:#E24B4A;font-weight:700;white-space:nowrap';
  sumTr.appendChild(sumTd0);
  for (let ci = 0; ci < 9; ci++) {
    let count = 0;
    ROOMS.forEach(r => { if (getStatus((data[r] || [])[ci]) === 'expired') count++; });
    const td = document.createElement('td');
    td.textContent = count;
    td.style.color = '#E24B4A';
    td.style.fontWeight = '700';
    sumTr.appendChild(td);
  }
  tbody.appendChild(sumTr);

  updateStats();
}

function commitCell(inp, room, ci) {
  const v = formatDate(inp.value);
  inp.value = v;
  if (v !== (data[room][ci] || '')) {
    data[room][ci] = v;
    applyClass(inp, v);
    saveCell(room, ci, v);
    updateStats();
  }
}

function focusCell(ri, ci) {
  const room = ROOMS[ri];
  const tr = document.getElementById('row-' + room);
  if (!tr) return;
  const inputs = tr.querySelectorAll('.cell-input');
  if (inputs[ci]) {
    inputs[ci].focus();
    inputs[ci].select();
    inputs[ci].scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function updateStats() {
  let unfilled = 0, expired = 0, expiring = 0;
  const totalCells = ROOMS.length * 9;
  let filled = 0;
  ROOMS.forEach(r => {
    (data[r] || []).forEach(v => {
      if (v) { filled++; const st = getStatus(v); if (st==='expired') expired++; else if (st==='expiring') expiring++; }
    });
  });
  unfilled = totalCells - filled;
  document.getElementById('filledCount').textContent = unfilled;
  document.getElementById('expiredCount').textContent = expired;
  document.getElementById('expiringCount').textContent = expiring;
}


function clearExpired() {
  const targets = [];
  ROOMS.forEach(r => {
    (data[r] || []).forEach((v, ci) => {
      if (getStatus(v) === 'expired') targets.push({r, ci});
    });
  });
  if (targets.length === 0) { alert('期限切れのセルはありません。'); return; }
  if (!confirm(targets.length + '件の期限切れデータを消去しますか？')) return;
  setSyncStatus('loading');
  const updates = {};
  targets.forEach(({r, ci}) => {
    data[r][ci] = '';
    updates['rooms/' + r + '/cells/' + ci] = null;
  });
  db.ref().update(updates)
    .then(() => { buildTable(); setSyncStatus('ok'); })
    .catch(e => setSyncStatus('err', e.message));
}

function openJump() {
  jumpPhase = 'room';
  document.getElementById('jumpTitle').textContent = '客室検索 — 部屋番号を入力';
  document.getElementById('jumpInput').style.display = '';
  document.getElementById('jumpHint').textContent = '3桁の部屋番号を入力して Enter';
  document.getElementById('jumpHint').style.color = '#888';
  document.getElementById('jumpInput').value = '';
  document.getElementById('jumpBtns').innerHTML = '<button class="btn" onclick="closeJump()" style="flex:1">キャンセル</button>';
  document.getElementById('jumpModal').classList.add('open');
  setTimeout(() => document.getElementById('jumpInput').focus(), 80);
}

document.getElementById('jumpInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && jumpPhase === 'room') {
    const v = parseInt(document.getElementById('jumpInput').value);
    if (ROOMS.includes(v)) {
      jumpPhase = 'item';
      document.getElementById('jumpTitle').textContent = v + ' — 項目を選択';
      document.getElementById('jumpInput').style.display = 'none';
      document.getElementById('jumpHint').textContent = 'ボタンをクリックして項目を選択';
      const btns = document.getElementById('jumpBtns');
      btns.innerHTML = '';
      COLS.forEach((col, ci) => {
        const b = document.createElement('button');
        b.className = 'item-btn';
        const curVal = (data[v] || [])[ci] || '';
        b.innerHTML = col + (curVal ? '<span class="cur-val">' + curVal + '</span>' : '');
        b.onclick = () => { closeJump(); setTimeout(() => focusCell(ROOMS.indexOf(v), ci), 100); };
        btns.appendChild(b);
      });
      const cancel = document.createElement('button');
      cancel.className = 'btn';
      cancel.textContent = 'キャンセル';
      cancel.style.cssText = 'flex:1 1 100%;margin-top:4px';
      cancel.onclick = closeJump;
      btns.appendChild(cancel);
    } else {
      document.getElementById('jumpHint').textContent = '部屋番号が見つかりません。再度入力してください。';
      document.getElementById('jumpHint').style.color = '#E24B4A';
      document.getElementById('jumpInput').value = '';
    }
  }
});

function closeJump() {
  document.getElementById('jumpModal').classList.remove('open');
}

document.getElementById('jumpModal').addEventListener('click', e => {
  if (e.target === document.getElementById('jumpModal')) closeJump();
});
</script>
</body>
</html>
